version: "3.9"

services:
  beam-dashboard:
    container_name: beam-dashboard
    # Image is published by .github/workflows/deploy.yml
    image: ghcr.io/hmmchat/beam-dashboard-dashboard:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3020

      # Auth whitelist
      ALLOWED_EMAILS: "alice@beam.place,bob@beam.place"

      # Google OAuth
      GOOGLE_CLIENT_ID: "replace-with-google-client-id"
      GOOGLE_CLIENT_SECRET: "replace-with-google-client-secret"

      # NextAuth
      NEXTAUTH_SECRET: "replace-with-openssl-rand-base64-32"
      NEXTAUTH_URL: "https://dashboard.beam.place"

      # NEXT_PUBLIC_* vars are inlined at image BUILD time (see Dockerfile + GitHub Actions).
      # docker-compose env does not replace those for browser-side API calls in a pre-built image.
      # Set NEXT_PUBLIC_API_URL (and optional NEXT_PUBLIC_ADMIN_USERS_PATH) in CI when building.
      NEXT_PUBLIC_API_URL: "https://api.beam.place"
    ports:
      - "127.0.0.1:3020:3020"
